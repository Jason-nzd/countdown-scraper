<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sample Product Grid For Testing</title>
  </head>
  <body>
    <product-grid
      data-loading="false"
      columns-extended="false"
      data-layout="grid"
    >
      <!-- Product 1: Boss Iced Coffee - Special price with unit price -->
      <cdx-card class="cdx-card-cup-adjustment card">
        <product-stamp-grid role="article" data-targeted-offer="false">
          <product-tag
            data-fixed-size="false"
            data-targeted-offer="false"
            data-product-strap="true"
          >
            <div id="product-239021-promoInfo" class="productStrap isSpecial">
              <div class="productStrap-title">Special</div>
              <div class="productStrap-text">20% Off</div>
            </div>
          </product-tag>
          <div class="product-entry product-cup">
            <a
              routerlink="/shop/productdetails"
              class="productImage-container"
              href="/shop/productdetails?stockcode=239021&name=boss-iced-coffee-caramel-latte"
            >
              <figure cdxproductimage="" size="big">
                <picture>
                  <img
                    loading="lazy"
                    src="https://assets.woolworths.com.au/images/2010/239021.jpg?impolicy=wowcdxwbjbx&w=200&h=200"
                    alt="boss iced coffee caramel latte"
                    aria-labelledby="product-239021-title"
                  />
                </picture>
              </figure>
              <div id="product-239021-tag">
                <div class="promoted">Promoted</div>
              </div>
            </a>
            <a
              routerlink="/shop/productdetails"
              tabindex="-1"
              href="/shop/productdetails?stockcode=239021&name=boss-iced-coffee-caramel-latte"
            >
              <h3
                id="product-239021-title"
                aria-label="Boss Iced Coffee Caramel Lattecan237ml."
                style="font-weight: bold"
              >
                boss iced coffee caramel latte Can 237mL
              </h3>
            </a>
            <div class="product-meta">
              <product-price-meta-v2>
                <div
                  class="priceMeta cupPriceAdjustment"
                  id="product-239021-unitPrice"
                >
                  <div class="cupPriceContainer">
                    <span class="cupPrice" aria-label="Unit price $12.66 / 1L"
                      >$12.66 / 1L<br
                    /></span>
                  </div>
                </div>
              </product-price-meta-v2>
            </div>
            <product-price
              ngclass="product-price-cup-adjustment"
              class="product-price-cup-adjustment"
              data-layout="grid"
              data-zoom="false"
            >
              <div class="priceCupAdjustmentDev">
                <h3
                  class="heading--2 presentPrice price--special priceCupAdjustment"
                  id="product-239021-price"
                  aria-label="$3.00 each."
                >
                  $ <em>3</em><span>00</span>
                </h3>
              </div>
              <div id="product-239021-save" class="previousPrice">
                <span class="price price--was" aria-label="Was 3.95$"
                  >Was $3.95</span
                >
                <span class="price price--save" aria-label="Save 0.95$"
                  >Save $0.95</span
                >
              </div>
            </product-price>
          </div>
          <footer>
            <product-add-to-trolley>
              <button
                cdxbutton=""
                aria-label="Add boss iced coffee caramel latte to trolley"
              >
                Add to trolley
              </button>
            </product-add-to-trolley>
          </footer>
        </product-stamp-grid>
      </cdx-card>

      <!-- Product 2: So Good Oat Milk - Special with 25% off, per L unit price -->
      <cdx-card class="cdx-card-cup-adjustment card">
        <product-stamp-grid role="article" data-targeted-offer="false">
          <product-tag
            data-fixed-size="false"
            data-targeted-offer="false"
            data-product-strap="true"
          >
            <div id="product-83273-promoInfo" class="productStrap isSpecial">
              <div class="productStrap-title">Special</div>
              <div class="productStrap-text">25% Off</div>
            </div>
          </product-tag>
          <div class="product-entry product-cup">
            <a
              routerlink="/shop/productdetails"
              class="productImage-container"
              href="/shop/productdetails?stockcode=83273&name=so-good-oat-milk-barista-edition-uht"
            >
              <figure cdxproductimage="" size="big">
                <picture>
                  <img
                    loading="lazy"
                    src="https://assets.woolworths.com.au/images/2010/83273.jpg?impolicy=wowcdxwbjbx&w=200&h=200"
                    alt="so good oat milk barista edition uht"
                    aria-labelledby="product-83273-title"
                  />
                </picture>
              </figure>
              <div id="product-83273-tag">
                <div class="promoted">Promoted</div>
              </div>
            </a>
            <a
              routerlink="/shop/productdetails"
              tabindex="-1"
              href="/shop/productdetails?stockcode=83273&name=so-good-oat-milk-barista-edition-uht"
            >
              <h3
                id="product-83273-title"
                aria-label="So Good Oat Milk Barista Edition Uhtcarton1l."
                style="font-weight: bold"
              >
                so good oat milk barista edition uht Carton 1L
              </h3>
            </a>
            <div class="product-meta">
              <product-price-meta-v2>
                <div
                  class="priceMeta cupPriceAdjustment"
                  id="product-83273-unitPrice"
                >
                  <div class="cupPriceContainer">
                    <span class="cupPrice" aria-label="Unit price $3.50 / 1L"
                      >$3.50 / 1L<br
                    /></span>
                  </div>
                </div>
              </product-price-meta-v2>
            </div>
            <product-price
              ngclass="product-price-cup-adjustment"
              class="product-price-cup-adjustment"
              data-layout="grid"
              data-zoom="false"
            >
              <div class="priceCupAdjustmentDev">
                <h3
                  class="heading--2 presentPrice price--special priceCupAdjustment"
                  id="product-83273-price"
                  aria-label="$3.50 each."
                >
                  $ <em>3</em><span>50</span>
                </h3>
              </div>
              <div id="product-83273-save" class="previousPrice">
                <span class="price price--was" aria-label="Was 4.99$"
                  >Was $4.99</span
                >
                <span class="price price--save" aria-label="Save 1.49$"
                  >Save $1.49</span
                >
              </div>
            </product-price>
          </div>
          <footer>
            <product-add-to-trolley>
              <button
                cdxbutton=""
                aria-label="Add so good oat milk barista edition uht to trolley"
              >
                Add to trolley
              </button>
            </product-add-to-trolley>
          </footer>
        </product-stamp-grid>
      </cdx-card>

      <!-- Product 3: Regular price product without special/promo -->
      <cdx-card class="card">
        <product-stamp-grid role="article" data-targeted-offer="false">
          <div class="product-entry">
            <a
              routerlink="/shop/productdetails"
              class="productImage-container"
              href="/shop/productdetails?stockcode=133211&name=bananas-yellow-loose"
            >
              <figure cdxproductimage="" size="big">
                <picture>
                  <img
                    loading="lazy"
                    src="https://assets.woolworths.com.au/images/2010/133211.jpg?impolicy=wowcdxwbjbx&w=200&h=200"
                    alt="bananas yellow loose"
                    aria-labelledby="product-133211-title"
                  />
                </picture>
              </figure>
            </a>
            <a
              routerlink="/shop/productdetails"
              tabindex="-1"
              href="/shop/productdetails?stockcode=133211&name=bananas-yellow-loose"
            >
              <h3
                id="product-133211-title"
                aria-label="Bananas Yellow Loose."
                style="font-weight: bold"
              >
                Bananas Yellow Loose
              </h3>
            </a>
            <div class="product-meta">
              <product-price-meta-v2>
                <div
                  class="priceMeta cupPriceAdjustment"
                  id="product-133211-unitPrice"
                >
                  <div class="cupPriceContainer">
                    <span class="cupPrice" aria-label="Unit price $3.50 / kg"
                      >$3.50 / kg<br
                    /></span>
                  </div>
                </div>
              </product-price-meta-v2>
            </div>
            <product-price data-layout="grid" data-zoom="false">
              <div class="priceCupAdjustmentDev">
                <h3
                  class="heading--2 presentPrice"
                  id="product-133211-price"
                  aria-label="$3.50 each."
                >
                  $ <em>3</em><span>50</span>
                </h3>
              </div>
            </product-price>
          </div>
          <footer>
            <product-add-to-trolley>
              <button
                cdxbutton=""
                aria-label="Add bananas yellow loose to trolley"
              >
                Add to trolley
              </button>
            </product-add-to-trolley>
          </footer>
        </product-stamp-grid>
      </cdx-card>
    </product-grid>
  </body>
</html>
